<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — My Toolbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #dff0da;
      color: #1a2e1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 48px 40px 32px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #b8d9b0;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    header a { font-size: 0.78rem; color: #5a8a5a; text-decoration: none; letter-spacing: 0.04em; }
    header a:hover { color: #1a2e1a; }

    /* ── Lock screen ── */
    #lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 110px);
      gap: 16px;
    }

    #lock-screen label { font-size: 0.78rem; color: #5a7a5a; letter-spacing: 0.08em; text-transform: uppercase; }

    #lock-screen input {
      border: 1px solid #b8d9b0;
      background: #eef7eb;
      padding: 10px 16px;
      font-size: 1rem;
      color: #1a2e1a;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.12em;
    }
    #lock-screen input:focus { border-color: #3a7a3a; }

    #lock-screen button {
      background: #2e6b2e;
      color: #dff0da;
      border: none;
      padding: 10px 32px;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.06em;
    }
    #lock-screen button:hover { background: #1a4a1a; }
    #lock-error { font-size: 0.78rem; color: #a04040; min-height: 1em; }

    /* ── Admin panel ── */
    #admin-panel { display: none; }
    main { padding: 40px; max-width: 900px; margin: 0 auto; }

    .section-title {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a7a5a;
      margin-bottom: 20px;
    }

    .form-card {
      border: 1px solid #b8d9b0;
      background: #eef7eb;
      padding: 28px;
      margin-bottom: 40px;
    }

    .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-row label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: #5a7a5a; }
    .form-row input, .form-row textarea {
      border: 1px solid #b8d9b0;
      background: #dff0da;
      padding: 9px 12px;
      font-size: 0.9rem;
      color: #1a2e1a;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }
    .form-row input:focus, .form-row textarea:focus { border-color: #3a7a3a; }

    .form-actions { display: flex; gap: 10px; margin-top: 8px; align-items: center; }
    .form-msg { font-size: 0.78rem; color: #3a7a3a; }
    .form-err { font-size: 0.78rem; color: #a04040; }

    .btn { padding: 9px 24px; font-size: 0.82rem; border: none; cursor: pointer; letter-spacing: 0.04em; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #2e6b2e; color: #dff0da; }
    .btn-primary:hover:not(:disabled) { background: #1a4a1a; }
    .btn-secondary { background: transparent; color: #5a7a5a; border: 1px solid #b8d9b0; }
    .btn-secondary:hover:not(:disabled) { border-color: #3a7a3a; color: #1a2e1a; }
    .btn-danger { background: transparent; color: #a04040; border: 1px solid #d9b8b8; font-size: 0.75rem; padding: 6px 14px; }
    .btn-danger:hover:not(:disabled) { background: #a04040; color: white; }
    .btn-sm { font-size: 0.75rem; padding: 5px 14px; }

    /* Tool list */
    .tool-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 48px; }

    .tool-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: #eef7eb;
      border: 1px solid #b8d9b0;
    }

    .tool-item.dragging { opacity: 0.4; }
    .tool-item.drag-over { border-color: #2e6b2e; }

    .drag-handle { cursor: grab; color: #9ab89a; font-size: 1rem; user-select: none; padding: 0 4px; flex-shrink: 0; }

    .tool-letter { font-size: 1.4rem; font-weight: 700; color: #2e6b2e; width: 36px; text-align: center; flex-shrink: 0; }

    .tool-info { flex: 1; min-width: 0; }
    .tool-title { font-size: 0.9rem; font-weight: 600; }
    .tool-url { font-size: 0.75rem; color: #5a7a5a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tool-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .empty-list { padding: 40px; text-align: center; color: #7a9a7a; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>mytoolbox / admin</h1>
    <a href="index.html">back to site</a>
  </header>

  <!-- Lock screen -->
  <div id="lock-screen">
    <label for="code-input">Access code</label>
    <input type="password" id="code-input" placeholder="••••••" autocomplete="off">
    <div id="lock-error"></div>
    <button onclick="unlock()">Enter</button>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel">
    <main>

      <!-- Add / Edit form -->
      <div class="form-card">
        <div class="section-title" id="form-label">Add tool</div>
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" placeholder="e.g. JSON Formatter">
        </div>
        <div class="form-row">
          <label for="f-url">URL</label>
          <input type="text" id="f-url" placeholder="https://...">
        </div>
        <div class="form-row">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" rows="2" placeholder="Short description"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="save-btn" onclick="saveItem()">Save</button>
          <button class="btn btn-secondary" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
          <span id="form-msg"></span>
        </div>
      </div>

      <!-- Tool list -->
      <div class="section-title">Tools</div>
      <div class="tool-list" id="tool-list"></div>

    </main>
  </div>

  <script src="config.js"></script>
  <script>
    // ── API helpers ──────────────────────────────────────────────
    const headers = {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    };

    async function api(path, method = 'GET', body) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    // ── Lock ─────────────────────────────────────────────────────
    document.getElementById('code-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    function unlock() {
      const val = document.getElementById('code-input').value;
      if (val === ADMIN_CODE) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadTools();
      } else {
        document.getElementById('lock-error').textContent = 'Incorrect code.';
        document.getElementById('code-input').value = '';
        document.getElementById('code-input').focus();
      }
    }

    // ── Load tools ───────────────────────────────────────────────
    let tools = [];

    async function loadTools() {
      const list = document.getElementById('tool-list');
      list.innerHTML = '<div class="empty-list">Loading...</div>';
      try {
        tools = await api('tools?select=*&order=sort_order.asc,created_at.asc');
        renderList();
      } catch (e) {
        list.innerHTML = `<div class="empty-list">Error: ${esc(e.message)}</div>`;
      }
    }

    // ── Render list ──────────────────────────────────────────────
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderList() {
      const list = document.getElementById('tool-list');
      if (!tools.length) {
        list.innerHTML = '<div class="empty-list">No tools yet. Add one above.</div>';
        return;
      }
      list.innerHTML = '';
      tools.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'tool-item';
        div.draggable = true;
        div.dataset.index = i;
        div.innerHTML = `
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <div class="tool-letter">${esc((t.title||'?').charAt(0).toUpperCase())}</div>
          <div class="tool-info">
            <div class="tool-title">${esc(t.title)}</div>
            <div class="tool-url">${esc(t.url||'')}</div>
          </div>
          <div class="tool-actions">
            <button class="btn btn-secondary btn-sm" onclick="editItem(${i})">Edit</button>
            <button class="btn btn-danger" onclick="deleteItem('${t.id}', ${i})">Delete</button>
          </div>
        `;
        attachDrag(div);
        list.appendChild(div);
      });
    }

    // ── Add / Edit / Delete ──────────────────────────────────────
    function setMsg(text, isErr = false) {
      const el = document.getElementById('form-msg');
      el.textContent = text;
      el.className = isErr ? 'form-err' : 'form-msg';
      if (text && !isErr) setTimeout(() => el.textContent = '', 3000);
    }

    async function saveItem() {
      const id = document.getElementById('edit-id').value;
      const title = document.getElementById('f-title').value.trim();
      const url = document.getElementById('f-url').value.trim();
      const description = document.getElementById('f-desc').value.trim();

      if (!title) { setMsg('Title is required.', true); return; }

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      setMsg('Saving...');

      try {
        if (!id) {
          const maxOrder = tools.length ? Math.max(...tools.map(t => t.sort_order || 0)) : -1;
          await api('tools', 'POST', { title, url, description, sort_order: maxOrder + 1 });
        } else {
          await api(`tools?id=eq.${id}`, 'PATCH', { title, url, description });
        }
        setMsg('Saved.');
        cancelEdit();
        await loadTools();
      } catch (e) {
        setMsg(e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    function editItem(i) {
      const t = tools[i];
      document.getElementById('edit-id').value = t.id;
      document.getElementById('f-title').value = t.title || '';
      document.getElementById('f-url').value = t.url || '';
      document.getElementById('f-desc').value = t.description || '';
      document.getElementById('form-label').textContent = 'Edit tool';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      document.getElementById('f-title').focus();
    }

    function cancelEdit() {
      document.getElementById('edit-id').value = '';
      document.getElementById('f-title').value = '';
      document.getElementById('f-url').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('form-label').textContent = 'Add tool';
      document.getElementById('cancel-btn').style.display = 'none';
      setMsg('');
    }

    async function deleteItem(id, i) {
      if (!confirm(`Delete "${tools[i].title}"?`)) return;
      try {
        await api(`tools?id=eq.${id}`, 'DELETE');
        await loadTools();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // ── Drag to reorder ──────────────────────────────────────────
    let dragIdx = null;

    function attachDrag(el) {
      el.addEventListener('dragstart', () => {
        dragIdx = parseInt(el.dataset.index);
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', async e => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const toIdx = parseInt(el.dataset.index);
        if (dragIdx === null || dragIdx === toIdx) return;

        const reordered = [...tools];
        const [moved] = reordered.splice(dragIdx, 1);
        reordered.splice(toIdx, 0, moved);

        // Update sort_order for all items
        try {
          await Promise.all(reordered.map((t, i) =>
            api(`tools?id=eq.${t.id}`, 'PATCH', { sort_order: i })
          ));
          tools = reordered;
          renderList();
        } catch (e) {
          alert('Error saving order: ' + e.message);
        }
        dragIdx = null;
      });
    }
  </script>
</body>
</html>
